context:
  version: 0.7.1

package:
  name: h5cpp
  version: ${{ version }}

source:
  - path: ../../../

build:
  number: 2
  script:
    - if: win
      then:
        - set CL=/DH5_BUILT_AS_DYNAMIC_LIB=1 %CL%
        - cmake -B build -G Ninja  %CMAKE_ARGS%  -DH5CPP_CONAN=DISABLE -DHDF5_FIND_DEBUG=ON  -DHDF5_USE_STATIC_LIBRARIES=OFF
    - if: linux
      then: cmake -B build  ${CMAKE_ARGS}  -DH5CPP_CONAN=DISABLE
    - if: osx and build_platform == target_platform
      then: cmake -B build  ${CMAKE_ARGS}  -DH5CPP_CONAN=DISABLE
    - if: osx and build_platform != target_platform
      then: cmake -B build  ${CMAKE_ARGS}  -DH5CPP_CONAN=DISABLE -DH5CPP_DISABLE_TESTS=ON
    - cmake --build build
    - cmake --install build
    - if: win
      then: ctest --test-dir build --extra-verbose --no-tests=error
    - if: linux
      then: ctest --test-dir build --extra-verbose --no-tests=error --exclude-regex='signed integer properties - char|signed integer properties with cref - char'
    - if: osx and build_platform == target_platform
      then: ctest --test-dir build --extra-verbose --no-tests=error --exclude-regex='signed integer properties - char|signed integer properties with cref - char'

requirements:
  build:
    - cmake
    - ninja
    - if: not win
      then: make
  host:
    - hdf5
    - catch2
    - zlib
  run_exports:
    - ${{ pin_subpackage("h5cpp", upper_bound="x.x") }}

tests:
  - package_contents:
      include:
        - h5cpp/file/file.hpp
        - h5cpp/core/*.hpp
        - h5cpp/attribute/*.hpp
        - h5cpp/dataspace/*.hpp
        - h5cpp/datatype/*.hpp
        - h5cpp/error/*.hpp
        - h5cpp/file/*.hpp
        - h5cpp/filter/*.hpp
        - h5cpp/node/*.hpp
        - h5cpp/property/*.hpp
        - h5cpp/utilities/*.hpp
        - h5cpp/contrib/nexus/ebool.hpp
        - h5cpp/contrib/stl/*.hpp
      lib:
        - h5cpp

about:
  homepage: https://github.com/ess-dmsc/h5cpp
  license: LGPL-2.1-only
  license_file: LICENSE
  summary: C++ wrapper for hdf5
  description: |
    h5cpp is C++ wrapper for hdf5
    which significantly simplifies development of HDF5 code.
    It provides a high level abstraction to the HDF5 low-level types.
  documentation: https://ess-dmsc.github.io/h5cpp
  repository: https://github.com/ess-dmsc/h5cpp

extra:
  recipe-maintainers:
    - jkotan
    - yuelongyu
